name: Propagate Release to Nexus Mods

on:
  release:
    types: [published]

jobs:
  upload-core:
    runs-on: ubuntu-latest
    steps:
      - name: Download Core Zip
        uses: robinraju/release-downloader@v1
        with:
          tag: ${{ github.event.release.tag_name }}
          fileName: "mod_legends-*.zip"
          out-file-path: "./"

      - name: Extract Asset Version from This Release
        id: versions
        run: |
          cat << 'EOF' > release_body.txt
          ${{ github.event.release.body }}
          EOF
          FULL_VERSION=$(grep -oP 'mod_legends-assets-\K[0-9.]+' release_body.txt | head -n 1)
          BASE_VERSION=$(echo "$FULL_VERSION" | cut -d. -f1,2).0
          echo "full=$FULL_VERSION" >> $GITHUB_OUTPUT
          echo "base=$BASE_VERSION" >> $GITHUB_OUTPUT

      - name: Upload Core to Nexus
        uses: Nexus-Mods/upload-action@v1.0.0-beta.3
        with:
          api_key: ${{ secrets.NEXUS_API_KEY }}
          file_group_id: ${{ secrets.NEXUS_CORE_ID }}
          filename: mod_legends-${{ github.event.release.tag_name }}.zip
          version: ${{ github.event.release.tag_name }}
          description: |
            REQUIRES VERSION 1.5.1.8+ OF VANILLA GAME

            SAVE COMPATIBLE WITH ${{ steps.versions.outputs.base }}+

            DO NOT UNZIP YOUR MOD FILES

            You need mod_legends-assets-${{ steps.versions.outputs.full }}.zip to play!

            To install: drop into 'data' Battle Brothers folder

  upload-assets:
    runs-on: ubuntu-latest
    needs: upload-core
    steps:
      - name: Download Assets Asset
        uses: robinraju/release-downloader@v1
        with:
          tag: ${{ github.event.release.tag_name }}
          fileName: "mod_legends-assets-*.zip"
          out-file-path: "./"

      - name: Check if Assets exist
        id: check_files
        run: |
          if ls ./mod_legends-assets-${{ github.event.release.tag_name }}.zip 1> /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload Assets to Nexus
        if: steps.check_files.outputs.exists == 'true'
        uses: Nexus-Mods/upload-action@v1.0.0-beta.3
        with:
          api_key: ${{ secrets.NEXUS_API_KEY }}
          file_group_id: ${{ secrets.NEXUS_ASSETS_ID }}
          filename: mod_legends-assets-${{ github.event.release.tag_name }}.zip
          version: ${{ github.event.release.tag_name }}
          description: |
            This is an asset library required to play the mod.

            It can be installed by just dropped it into data. DO NOT UNZIP.
